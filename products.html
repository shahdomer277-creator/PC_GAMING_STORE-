<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <title>المنتجات | جيمنج زون</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">Shahooda Gaming<span> Zone</span></div>
        <nav>
            <a href="index.html">الرئيسية</a>
            <a href="products.html" class="active">المنتجات</a>
            <a href="contact.html">تواصل معنا</a>
            <a href="login.html" class="btn-login">تسجيل الدخول</a>

    <main class="products-container">
        <h1 class="section-title">عتاد القيمنق الاحترافي</h1>

            <div class="product-card">
                <img src="image/gpu.jpg" alt="كرت شاشة">
                <h3>كرت شاشة RTX 4060 Ti</h3>
                <p class="price">$399.99</p>
                <button class="btn-buy">إضافة للسلة</button>

    <script src="js/main.js"></script>
